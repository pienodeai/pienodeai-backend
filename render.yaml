# Render Blueprint - https://docs.render.com/blueprint-spec
# Deploy: connect repo in Render Dashboard or use "New > Blueprint" and point to this file.
# Required: set MONGODB_URI and CORS_ORIGINS in Render Dashboard > Environment.
services:
  - type: web
    name: pienodeai-backend
    runtime: node
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
    # Run from repo root (leave Root Directory blank in Render Dashboard)
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
